version: 2

models:
  - name: stg_orders
    description: One row per order, cleaned and typed.
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: customer_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id

  - name: stg_customers
    description: One row per customer checkout identity.
    columns:
      - name: customer_id
        tests: [unique, not_null]

  - name: stg_order_items
    description: One row per item within an order.
    columns:
      - name: order_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id
      - name: item_price
        tests: [not_null]