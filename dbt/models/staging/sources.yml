version: 2

sources:
  - name: raw
    description: Raw Olist tables loaded by the dlt ingestion pipeline.
    schema: raw
    tables:
      - name: orders
        columns:
          - name: order_id
            tests: [unique, not_null]
          - name: customer_id
            tests: [not_null]
          - name: order_status
            tests:
              - accepted_values:
                  arguments:
                    values:
                      - delivered
                      - shipped
                      - canceled
                      - unavailable
                      - invoiced
                      - processing
                      - created
                      - approved
      - name: order_items
        columns:
          - name: order_id
            tests: [not_null]
          - name: product_id
            tests: [not_null]
      - name: customers
        columns:
          - name: customer_id
            tests: [unique, not_null]
      - name: products
        columns:
          - name: product_id
            tests: [unique, not_null]
      - name: sellers
        columns:
          - name: seller_id
            tests: [unique, not_null]
      - name: order_payments
        columns:
          - name: order_id
            tests: [not_null]
      - name: order_reviews
        columns:
          - name: review_id
            tests: [not_null]
      - name: geolocation
      - name: product_category_translation